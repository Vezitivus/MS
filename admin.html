<!doctype html><html lang="lv"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#f5f7fb"><title>Admin</title><link rel="stylesheet" href="assets/style.css"></head><body><main class="shell"><header class="topbar"><div class="brand">MS Admin</div><a class="icon-btn" href="index.html">×</a></header><section class="hero"><div class="eyebrow">Vadības panelis</div><h1>Sezonas un aktivitātes.</h1><p class="muted">Mobilais panelis sezonu, dalībnieku, pieteikumu un rezultātu pārvaldībai.</p></section><div class="tabs"><button class="tab active" data-tab="season">Sezona</button><button class="tab" data-tab="activities">Aktivitātes</button><button class="tab" data-tab="results">Rezultāti</button><button class="tab" data-tab="players">Dalībnieki</button></div><section id="season" class="tab-panel card" style="margin-top:14px"><form id="seasonForm" class="form-grid"><div class="field"><label>SEZONAS NOSAUKUMS</label><input id="seasonTitle" required></div><div class="form-grid two"><div class="field"><label>SEZONAS KODS</label><input id="seasonCode" required></div><div class="field"><label>LABĀKO REZULTĀTU SKAITS</label><input id="bestCount" type="number" min="1" value="12" required></div></div><button class="btn primary block">Saglabāt sezonu</button></form></section><section id="activities" class="tab-panel hidden"><div class="card"><form id="activityForm" class="form-grid"><input id="activityId" type="hidden"><div class="field"><label>AKTIVITĀTES NOSAUKUMS</label><input id="activityName" required></div><div class="field"><label>SĀKUMS</label><input id="startAt" type="datetime-local" required></div><div class="form-grid two"><div class="field"><label>PIETEIKŠANĀS NO</label><input id="openAt" type="datetime-local"></div><div class="field"><label>PIETEIKŠANĀS LĪDZ</label><input id="closeAt" type="datetime-local"></div></div><div class="field"><label>APRAKSTS</label><textarea id="description"></textarea></div><button class="btn primary block">Saglabāt aktivitāti</button></form></div><div id="activityList" class="list" style="margin-top:12px"></div></section><section id="results" class="tab-panel hidden"><div class="card"><div class="field"><label>IZVĒLIES AKTIVITĀTI</label><select id="resultActivity"></select></div></div><div id="resultList" class="list" style="margin-top:12px"></div><button id="saveResults" class="btn primary block hidden" style="margin-top:12px">Saglabāt rezultātus</button></section><section id="players" class="tab-panel hidden"><div id="playerList" class="list"></div></section></main><script src="assets/api.js"></script><script src="assets/app.js"></script><script src="assets/admin.js"></script></body></html>
