<!doctype html><html lang="lv"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#f5f7fb"><title>MS Admin</title><link rel="stylesheet" href="assets/style.css?v=20260723-2"><style>.auth-wrap{min-height:100svh;display:grid;place-items:center;padding:24px 0}.auth-card{width:100%;max-width:460px}.admin-shell{display:none}.admin-shell.show{display:block}.sync-overlay{position:fixed;inset:0;z-index:9999;display:none;place-items:center;background:rgba(247,247,249,.82);backdrop-filter:blur(18px)}.sync-overlay.show{display:grid}.sync-ring{width:44px;height:44px;margin:0 auto 14px;border:4px solid rgba(0,0,0,.1);border-top-color:#111827;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.link-btn{border:0;background:none;width:100%;padding:13px;font:inherit;font-weight:700;cursor:pointer;color:#0a84ff}.private-code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.1em}</style></head><body><div id="syncOverlay" class="sync-overlay"><div style="text-align:center"><div class="sync-ring"></div><strong id="syncText">Ielādējam sēriju…</strong></div></div><main id="authView" class="shell auth-wrap"><section class="card auth-card"><div style="text-align:center;margin-bottom:18px"><div class="eyebrow">MS ADMIN</div><h1 id="adminAuthTitle">Atvērt sēriju</h1><p id="adminAuthSub" class="muted">Ievadi sērijas kodu un administratora PIN.</p></div><form id="seriesLoginForm" class="form-grid"><div class="field"><label>SĒRIJAS KODS</label><input id="loginSeriesCode" class="private-code" autocapitalize="characters" autocomplete="username" required></div><div class="field"><label>ADMIN PIN</label><input id="loginAdminPin" type="password" inputmode="numeric" pattern="[0-9]{5}" maxlength="5" autocomplete="current-password" required></div><button class="btn primary block" type="submit">Atvērt sēriju</button><button id="showCreateSeries" class="link-btn" type="button" onclick="showCreateSeriesForm()">Izveidot jaunu sēriju</button></form><form id="createSeriesForm" class="form-grid hidden"><div class="field"><label>SĒRIJAS NOSAUKUMS</label><input id="createSeriesName" required placeholder="Friends Cup 2027"></div><div class="field"><label>PRIVĀTAIS PIEVIENOŠANĀS KODS</label><input id="createSeriesCode" class="private-code" autocapitalize="characters" minlength="4" maxlength="16" required placeholder="FC27VIP"></div><div class="field"><label>IZVEIDO ADMIN PIN</label><input id="createAdminPin" type="password" inputmode="numeric" pattern="[0-9]{5}" maxlength="5" required placeholder="5 cipari"></div><div class="field"><label>LABĀKO REZULTĀTU SKAITS</label><input id="createBestCount" type="number" min="1" value="12" required></div><button class="btn primary block" type="submit">Izveidot un atvērt</button><button id="showSeriesLogin" class="link-btn" type="button" onclick="showSeriesLoginForm()">Man jau ir sērija</button></form><div id="authMessage" class="notice hidden" style="margin-top:14px"></div></section></main><main id="adminApp" class="shell admin-shell"><header class="topbar"><div class="brand" id="adminBrand">MS Admin</div><button id="adminLogout" class="icon-btn" aria-label="Iziet">↗</button></header><section class="hero"><div class="eyebrow">Vadības panelis</div><h1 id="activeSeriesName">Sērija</h1><p class="muted">Aktivitātes, dalībnieki, rezultāti un kopvērtējums.</p></section><div class="tabs"><button class="tab active" data-tab="series">Sērija</button><button class="tab" data-tab="activities">Aktivitātes</button><button class="tab" data-tab="standings">Kopvērtējums</button><button class="tab" data-tab="players">Dalībnieki</button></div><section id="series" class="tab-panel card" style="margin-top:14px"><form id="seriesForm" class="form-grid"><div class="field"><label>SĒRIJAS NOSAUKUMS</label><input id="seriesTitle" required></div><div class="field"><label>PRIVĀTAIS PIEVIENOŠANĀS KODS</label><input id="seriesCode" class="private-code" required></div><div class="field"><label>JAUNS ADMIN PIN</label><input id="seriesAdminPin" type="password" inputmode="numeric" pattern="[0-9]{5}" maxlength="5" placeholder="Atstāj tukšu, lai nemainītu"></div><div class="field"><label>LABĀKO REZULTĀTU SKAITS</label><input id="bestCount" type="number" min="1" required></div><button class="btn primary block">Saglabāt</button></form></section><section id="activities" class="tab-panel hidden"><div class="card"><form id="activityForm" class="form-grid"><input id="activityId" type="hidden"><div class="field"><label>AKTIVITĀTES NOSAUKUMS</label><input id="activityName" required></div><div class="field"><label>SĀKUMS</label><input id="startAt" type="datetime-local" required></div><div class="form-grid two"><div class="field"><label>PIETEIKŠANĀS NO</label><input id="openAt" type="datetime-local"></div><div class="field"><label>PIETEIKŠANĀS LĪDZ</label><input id="closeAt" type="datetime-local"></div></div><div class="field"><label>APRAKSTS</label><textarea id="description"></textarea></div><button class="btn primary block">Saglabāt aktivitāti</button></form></div><div id="activityList" class="list" style="margin-top:12px"></div><div id="activityResultsCard" class="card hidden" style="margin-top:12px"><div class="section-head"><div><div class="eyebrow">Rezultātu ievade</div><h2 id="activityResultsTitle">Aktivitāte</h2></div><button id="closeActivityResults" class="btn">Aizvērt</button></div><div id="activityResultList" class="list" style="margin-top:12px"></div><button id="saveActivityResults" class="btn primary block hidden" style="margin-top:12px">Saglabāt rezultātus</button></div></section><section id="standings" class="tab-panel hidden"><div class="card"><div class="eyebrow">Kopvērtējums</div><h2 id="standingsTitle">Best 12</h2></div><div id="standingsList" class="list" style="margin-top:12px"></div></section><section id="players" class="tab-panel hidden"><div id="playerList" class="list"></div></section></main><script>function showCreateSeriesForm(){document.getElementById('seriesLoginForm').classList.add('hidden');document.getElementById('createSeriesForm').classList.remove('hidden');document.getElementById('adminAuthTitle').textContent='Izveidot sēriju';document.getElementById('adminAuthSub').textContent='Nosaukums, privātais kods un 5 ciparu admin PIN.';document.getElementById('authMessage').classList.add('hidden')}function showSeriesLoginForm(){document.getElementById('createSeriesForm').classList.add('hidden');document.getElementById('seriesLoginForm').classList.remove('hidden');document.getElementById('adminAuthTitle').textContent='Atvērt sēriju';document.getElementById('adminAuthSub').textContent='Ievadi sērijas kodu un administratora PIN.';document.getElementById('authMessage').classList.add('hidden')}</script><script src="assets/api.js?v=20260723-2"></script><script src="assets/app.js?v=20260723-2"></script><script src="assets/admin.js?v=20260723-2"></script></body></html>
