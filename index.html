<!doctype html><html lang="lv"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#f5f7fb"><link rel="icon" href="data:,"><title>MS Apps</title><link rel="stylesheet" href="assets/style.css?v=20260724-4"><style>.auth-wrap{min-height:100svh;display:grid;place-items:center;padding:24px 0}.auth-card{width:100%;max-width:460px}.auth-title{text-align:center;margin-bottom:20px}.photo-pick{width:112px;height:112px;border-radius:50%;margin:0 auto 16px;display:grid;place-items:center;overflow:hidden;border:1px solid rgba(0,0,0,.1);background:#eef0f4;cursor:pointer}.photo-pick img{width:100%;height:100%;object-fit:cover}.sync-overlay{position:fixed;inset:0;z-index:9999;display:none;place-items:center;background:rgba(247,247,249,.78);backdrop-filter:blur(20px)}.sync-overlay.show{display:grid}.sync-box{text-align:center}.sync-ring{width:46px;height:46px;margin:0 auto 14px;border:4px solid rgba(0,0,0,.1);border-top-color:#111;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.link-btn{border:0;background:none;padding:14px;width:100%;font:inherit;font-weight:650;cursor:pointer}</style></head><body><div id="syncOverlay" class="sync-overlay"><div class="sync-box"><div class="sync-ring"></div><strong id="syncText">Saglabājam tavu profilu…</strong></div></div><main class="shell auth-wrap"><section class="card auth-card"><div class="auth-title"><div class="eyebrow">MS APPS</div><h1 id="authHeading">Pieslēgties</h1><p id="authSub" class="muted">Ievadi savu vārdu un 5 ciparu PIN.</p></div><form id="loginForm" class="form-grid"><div class="field"><label>VĀRDS</label><input id="loginName" autocomplete="name" required></div><div class="field"><label>PIN KODS</label><input id="loginPin" type="password" inputmode="numeric" pattern="[0-9]{5}" maxlength="5" autocomplete="current-password" required></div><button class="btn primary block">Pieslēgties</button><button id="showRegister" class="link-btn" type="button">Nav konta? Reģistrēties</button></form><form id="registerForm" class="form-grid hidden"><label class="photo-pick" for="registerImage"><img id="registerPreview" alt="Profila attēls" src="https://ui-avatars.com/api/?name=Foto&background=e5e7eb&color=111827&size=256"></label><input id="registerImage" type="file" accept="image/*" hidden><div class="field"><label>VĀRDS</label><input id="registerName" autocomplete="name" minlength="2" required></div><div class="field"><label>IZVEIDO PIN KODU</label><input id="registerPin" type="password" inputmode="numeric" pattern="[0-9]{5}" maxlength="5" autocomplete="new-password" required></div><button class="btn primary block">Izveidot profilu</button><button id="showLogin" class="link-btn" type="button">Man jau ir profils</button></form><div id="msg" class="notice hidden" style="margin-top:14px"></div></section></main><script src="assets/api.js?v=20260724-4"></script><script>(()=>{const CLOUDINARY={cloudName:'dmkpb05ww',uploadPreset:'Vezitivus',folder:'Vezitivus'};if(MS.session()?.playerId){location.replace('season.html');return}let selectedFile=null;const norm=value=>String(value||'').trim().replace(/\s+/g,' ').toLocaleLowerCase('lv-LV').normalize('NFD').replace(/[\u0300-\u036f]/g,'');const uid=()=>crypto.randomUUID?.()||`id-${Date.now()}-${Math.random().toString(36).slice(2)}`;const byId=id=>document.getElementById(id),loginForm=byId('loginForm'),registerForm=byId('registerForm'),msg=byId('msg'),syncOverlay=byId('syncOverlay'),syncText=byId('syncText');byId('showRegister').onclick=()=>setMode(true);byId('showLogin').onclick=()=>setMode(false);byId('registerImage').onchange=()=>{selectedFile=byId('registerImage').files?.[0]||null;if(selectedFile)byId('registerPreview').src=URL.createObjectURL(selectedFile)};function setMode(register){loginForm.classList.toggle('hidden',register);registerForm.classList.toggle('hidden',!register);byId('authHeading').textContent=register?'Izveidot profilu':'Pieslēgties';byId('authSub').textContent=register?'Vārds, bilde un 5 ciparu PIN.':'Ievadi savu vārdu un 5 ciparu PIN.';msg.classList.add('hidden')}function showError(error){msg.textContent=error?.message||String(error);msg.classList.remove('hidden')}function busy(on,text){syncText.textContent=text||'Saglabājam tavu profilu…';syncOverlay.classList.toggle('show',on)}loginForm.onsubmit=async event=>{event.preventDefault();busy(true,'Pieslēdzam tavu profilu…');try{const db=await MS.load();const player=(db.players||[]).find(item=>norm(item.name)===norm(byId('loginName').value)&&String(item.accessCode)===byId('loginPin').value.trim());if(!player)throw new Error('Nepareizs vārds vai PIN kods.');MS.setSession({playerId:player.id,authToken:player.authToken||'',seasonId:''});location.href='season.html'}catch(error){busy(false);showError(error)}};registerForm.onsubmit=async event=>{event.preventDefault();busy(true,'Saglabājam tavu profilu…');try{const name=byId('registerName').value.trim(),pin=byId('registerPin').value.trim();if(name.length<2)throw new Error('Ievadi vārdu.');if(!/^\d{5}$/.test(pin))throw new Error('PIN kodam jābūt tieši 5 cipariem.');const db=await MS.load();if((db.players||[]).some(item=>norm(item.name)===norm(name)))throw new Error('Profils ar šādu vārdu jau pastāv.');let image='',imagePublicId='';if(selectedFile){const form=new FormData();form.append('file',selectedFile);form.append('upload_preset',CLOUDINARY.uploadPreset);form.append('folder',CLOUDINARY.folder);const response=await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY.cloudName}/image/upload`,{method:'POST',body:form});const result=await response.json();if(!response.ok||!result.secure_url)throw new Error(result?.error?.message||'Neizdevās saglabāt attēlu.');image=result.secure_url;imagePublicId=result.public_id||''}const timestamp=new Date().toISOString();const player={id:uid(),name,image,imagePublicId,authToken:uid(),accessCode:pin,createdAt:timestamp,updatedAt:timestamp};const saved=await MS.saveRow('Players',player);MS.setSession({playerId:saved.id,authToken:saved.authToken||player.authToken,seasonId:''});location.href='season.html'}catch(error){busy(false);showError(error)}}})();</script></body></html>
