<!doctype html><html lang="lv"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#f5f7fb"><title>MS Apps</title><link rel="stylesheet" href="assets/style.css"></head><body><main class="shell"><header class="topbar"><div class="brand">MS Apps</div></header><section class="hero"><div class="eyebrow">Spēlētāja konts</div><h1>Viens profils visām sērijām.</h1><p class="muted">Izveido profilu vienreiz. Pēc tam pievienojies jebkurai sacensību sērijai ar tās kodu.</p></section><section class="card"><div class="tabs"><button class="tab active" data-mode="create">Jauns profils</button><button class="tab" data-mode="login">Esošs profils</button></div><form id="createForm" class="form-grid" style="margin-top:16px"><div class="field"><label>VĀRDS</label><input id="createName" autocomplete="name" placeholder="Tavs vārds" minlength="2" required></div><button class="btn primary block" type="submit">Izveidot profilu</button></form><form id="loginForm" class="form-grid hidden" style="margin-top:16px"><div class="field"><label>SPĒLĒTĀJA ID</label><input id="loginId" autocomplete="username" autocapitalize="characters" placeholder="Piemēram, MS0042" required></div><div class="field"><label>PIEKĻUVES KODS</label><input id="loginCode" type="password" inputmode="numeric" autocomplete="current-password" placeholder="6 cipari" required></div><button class="btn primary block" type="submit">Atvērt profilu</button></form><div id="msg" class="notice hidden" style="margin-top:14px"></div></section></main><script src="assets/api.js"></script><script src="assets/app.js"></script><script>const old=MS.session();if(old?.playerId&&old?.authToken)location.replace('season.html');UI.$$('.tab').forEach(b=>b.onclick=()=>{UI.$$('.tab').forEach(x=>x.classList.toggle('active',x===b));createForm.classList.toggle('hidden',b.dataset.mode!=='create');loginForm.classList.toggle('hidden',b.dataset.mode!=='login');msg.classList.add('hidden')});function show(e){msg.textContent=e?.message||String(e);msg.classList.remove('hidden')}createForm.onsubmit=async e=>{e.preventDefault();try{const p=await MS.api('createProfile',{name:createName.value.trim()});MS.setSession({playerId:p.id,authToken:p.authToken,seasonId:''});alert(`Profils izveidots.\nSpēlētāja ID: ${p.id}\nPiekļuves kods: ${p.accessCode}\n\nSaglabā šos datus.`);location.href='season.html'}catch(err){show(err)}};loginForm.onsubmit=async e=>{e.preventDefault();try{const p=await MS.api('loginProfile',{playerId:loginId.value.trim().toUpperCase(),accessCode:loginCode.value.trim()});MS.setSession({playerId:p.id,authToken:p.authToken,seasonId:''});location.href='season.html'}catch(err){show(err)}};</script></body></html>
