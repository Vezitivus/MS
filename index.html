<!doctype html><html lang="lv"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#f5f7fb"><title>MS Apps</title><link rel="stylesheet" href="assets/style.css"><style>.auth-wrap{min-height:100svh;display:grid;place-items:center;padding:24px 0}.auth-card{width:100%;max-width:460px}.auth-title{text-align:center;margin-bottom:20px}.photo-pick{width:112px;height:112px;border-radius:50%;margin:0 auto 16px;display:grid;place-items:center;overflow:hidden;border:1px solid rgba(0,0,0,.1);background:#eef0f4;cursor:pointer}.photo-pick img{width:100%;height:100%;object-fit:cover}.sync-overlay{position:fixed;inset:0;z-index:9999;display:none;place-items:center;background:rgba(247,247,249,.78);backdrop-filter:blur(20px)}.sync-overlay.show{display:grid}.sync-box{text-align:center}.sync-ring{width:46px;height:46px;margin:0 auto 14px;border:4px solid rgba(0,0,0,.1);border-top-color:#111;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.link-btn{border:0;background:none;padding:14px;width:100%;font:inherit;font-weight:650;cursor:pointer}</style></head><body><div id="syncOverlay" class="sync-overlay"><div class="sync-box"><div class="sync-ring"></div><strong id="syncText">Saglabājam tavu profilu…</strong></div></div><main class="shell auth-wrap"><section class="card auth-card"><div class="auth-title"><div class="eyebrow">MS APPS</div><h1 id="authHeading">Pieslēgties</h1><p id="authSub" class="muted">Ievadi savu vārdu un 5 ciparu PIN.</p></div><form id="loginForm" class="form-grid"><div class="field"><label>VĀRDS</label><input id="loginName" autocomplete="name" placeholder="Tavs vārds" required></div><div class="field"><label>PIN KODS</label><input id="loginPin" type="password" inputmode="numeric" pattern="[0-9]{5}" maxlength="5" autocomplete="current-password" placeholder="5 cipari" required></div><button class="btn primary block" type="submit">Pieslēgties</button><button id="showRegister" class="link-btn" type="button">Nav konta? Reģistrēties</button></form><form id="registerForm" class="form-grid hidden"><label class="photo-pick" for="registerImage"><img id="registerPreview" alt="Profila attēls" src="https://ui-avatars.com/api/?name=Foto&background=e5e7eb&color=111827&size=256"></label><input id="registerImage" type="file" accept="image/*" hidden><div class="field"><label>VĀRDS</label><input id="registerName" autocomplete="name" placeholder="Tavs vārds" minlength="2" required></div><div class="field"><label>IZVEIDO PIN KODU</label><input id="registerPin" type="password" inputmode="numeric" pattern="[0-9]{5}" maxlength="5" autocomplete="new-password" placeholder="5 cipari" required></div><button class="btn primary block" type="submit">Izveidot profilu</button><button id="showLogin" class="link-btn" type="button">Man jau ir profils</button></form><div id="msg" class="notice hidden" style="margin-top:14px"></div></section></main><script src="assets/api.js"></script><script>const CLOUDINARY={cloudName:'dmkpb05ww',uploadPreset:'Vezitivus',folder:'Vezitivus'};const old=MS.session();if(old?.playerId&&old?.authToken)location.replace('season.html');let selectedFile=null;showRegister.onclick=()=>setMode('register');showLogin.onclick=()=>setMode('login');registerImage.onchange=()=>{selectedFile=registerImage.files?.[0]||null;if(selectedFile)registerPreview.src=URL.createObjectURL(selectedFile)};function setMode(mode){const reg=mode==='register';loginForm.classList.toggle('hidden',reg);registerForm.classList.toggle('hidden',!reg);authHeading.textContent=reg?'Izveidot profilu':'Pieslēgties';authSub.textContent=reg?'Vārds, bilde un 5 ciparu PIN. Tas arī viss.':'Ievadi savu vārdu un 5 ciparu PIN.';msg.classList.add('hidden')}function showError(error){msg.textContent=error?.message||String(error);msg.classList.remove('hidden')}function busy(on,text='Saglabājam tavu profilu…'){syncText.textContent=text;syncOverlay.classList.toggle('show',on)}loginForm.onsubmit=async e=>{e.preventDefault();busy(true,'Pieslēdzam tavu profilu…');try{const p=await MS.api('loginProfile',{name:loginName.value.trim(),accessCode:loginPin.value.trim()});MS.setSession({playerId:p.id,authToken:p.authToken,seasonId:''});MS.setCache({players:[p],seasons:[],memberships:[],activities:[],registrations:[],results:[]});location.href='season.html'}catch(err){busy(false);showError(err)}};registerForm.onsubmit=async e=>{e.preventDefault();if(!/^\d{5}$/.test(registerPin.value))return showError(new Error('PIN kodam jābūt tieši 5 cipariem.'));busy(true);try{let image='',imagePublicId='';if(selectedFile){const form=new FormData();form.append('file',selectedFile);form.append('upload_preset',CLOUDINARY.uploadPreset);form.append('folder',CLOUDINARY.folder);const response=await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY.cloudName}/image/upload`,{method:'POST',body:form});const result=await response.json();if(!response.ok||!result.secure_url)throw new Error(result?.error?.message||'Neizdevās saglabāt attēlu.');image=result.secure_url;imagePublicId=result.public_id||''}const p=await MS.api('createProfile',{name:registerName.value.trim(),accessCode:registerPin.value.trim(),image,imagePublicId});MS.setSession({playerId:p.id,authToken:p.authToken,seasonId:''});MS.setCache({players:[p],seasons:[],memberships:[],activities:[],registrations:[],results:[]});location.href='season.html'}catch(err){busy(false);showError(err)}};</script></body></html>
