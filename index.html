<!doctype html><html lang="lv"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#f5f7fb"><title>MS Season</title><link rel="stylesheet" href="assets/style.css"></head><body><main class="shell"><header class="topbar"><div class="brand">MS Season</div><a class="icon-btn" href="admin.html" aria-label="Admin">⚙</a></header><section class="hero"><div class="eyebrow">Season competition</div><h1>Pievienojies savai sezonai.</h1><p class="muted">Ievadi sezonas kodu un savu vārdu. Nākamreiz profils atvērsies automātiski.</p></section><section class="card"><form id="joinForm" class="form-grid"><div class="field"><label>SEZONAS KODS</label><input id="code" autocomplete="off" autocapitalize="characters" placeholder="Piemēram, FC26" required></div><div class="field"><label>VĀRDS</label><input id="name" autocomplete="name" placeholder="Tavs vārds" required></div><button class="btn primary block" type="submit">Atvērt manu profilu</button><div id="msg" class="notice hidden"></div></form></section></main><script src="assets/api.js"></script><script src="assets/app.js"></script><script>const s=MS.session();if(s?.playerId&&s?.seasonId)location.replace('season.html');joinForm.addEventListener('submit',async e=>{e.preventDefault();try{const db=await MS.api('bootstrap');const season=db.seasons.find(x=>x.code.toLowerCase()===code.value.trim().toLowerCase());if(!season)throw new Error('Sezona ar šādu kodu nav atrasta.');const p=await MS.api('joinPlayer',{seasonId:season.id,name:name.value});MS.setSession({playerId:p.id,seasonId:season.id});location.href='season.html'}catch(err){msg.textContent=err.message;msg.classList.remove('hidden')}});</script></body></html>
