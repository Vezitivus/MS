<!doctype html><html lang="lv"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#f5f7fb"><title>Kopvērtējums</title><link rel="stylesheet" href="assets/style.css"></head><body><main class="shell"><header class="topbar"><div class="brand">Kopvērtējums</div></header><section class="hero"><div class="eyebrow" id="seasonName">Sezona</div><h1 id="title">Leaderboard</h1><p id="subtitle" class="muted"></p></section><div id="board" class="list"></div></main><nav class="bottom-nav"><a href="season.html">Profils</a><a class="active" href="leaderboard.html">Kopvērtējums</a><a href="index.html" onclick="MS.clearSession()">Mainīt</a></nav><script src="assets/api.js"></script><script src="assets/app.js"></script><script>(async()=>{const s=MS.session();if(!s?.seasonId)return location.replace('index.html');const db=await MS.api('bootstrap'),season=db.seasons.find(x=>x.id===s.seasonId),rows=UI.leaderboard(db,s.seasonId);seasonName.textContent=season?.name||'Sezona';subtitle.textContent=`Skaitīti ${season?.bestCount||12} labākie rezultāti`;board.innerHTML=rows.length?rows.map(p=>`<div class="row"><div class="rank">${p.rank}</div><img class="avatar sm" src="${p.image||`https://ui-avatars.com/api/?name=${encodeURIComponent(p.name)}&background=e5e7eb&color=111827`}" alt=""><div class="row-main"><div class="row-title">${UI.esc(p.name)}</div><div class="row-sub">${p.events} aktivitātes · labākais ${p.bestScore} · vidēji ${p.avg.toFixed(1).replace('.',',')}</div></div><div class="points">${p.total}</div></div>`).join(''):'<div class="card empty">Dalībnieku vēl nav.</div>'})()</script></body></html>
