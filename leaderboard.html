<!doctype html><html lang="lv"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#f5f7fb"><link rel="icon" href="data:,"><title>Kopvērtējums</title><link rel="stylesheet" href="assets/style.css?v=20260724-4"></head><body><main class="shell"><header class="topbar"><div class="brand">Kopvērtējums</div></header><section class="hero"><div class="eyebrow" id="seasonName">Sērija</div><h1>Leaderboard</h1><p id="subtitle" class="muted"></p></section><div id="board" class="list"><div class="card empty">Ielādējam…</div></div></main><nav class="bottom-nav"><a href="season.html">Profils</a><a class="active" href="leaderboard.html">Kopvērtējums</a><a href="index.html" id="logoutLink">Iziet</a></nav><script src="assets/api.js?v=20260724-4"></script><script src="assets/app.js?v=20260724-4"></script><script>(()=>{const session=MS.session();if(!session?.playerId){location.replace('index.html');return}document.getElementById('logoutLink').onclick=()=>{MS.clearSession();MS.clearCache()};const render=db=>{const memberships=UI.membershipsFor(db,session.playerId);let season=(db.seasons||[]).find(item=>String(item.id)===String(MS.session()?.seasonId));if(!season&&memberships.length){season=(db.seasons||[]).find(item=>String(item.id)===String(memberships[0].seasonId));MS.setSession({...MS.session(),seasonId:season?.id||''})}if(!season){document.getElementById('board').innerHTML='<div class="card empty">Vispirms pievienojies sērijai profilā.</div>';return}const rows=UI.leaderboard(db,season.id);document.getElementById('seasonName').textContent=season.name;document.getElementById('subtitle').textContent=`Skaitīti ${season.bestCount||12} labākie rezultāti`;document.getElementById('board').innerHTML=rows.length?rows.map(player=>`<div class="row"><div class="rank">${player.rank}</div><img class="avatar sm" src="${player.image||`https://ui-avatars.com/api/?name=${encodeURIComponent(player.name)}&background=e5e7eb&color=111827`}" alt=""><div class="row-main"><div class="row-title">${UI.esc(player.name)}</div><div class="row-sub">${player.events} aktivitātes · skaitīti ${player.countedEvents} · labākais ${player.bestScore}</div></div><div class="points">${player.total}</div></div>`).join(''):'<div class="card empty">Dalībnieku vēl nav.</div>'};const cached=MS.cache();if((cached.seasons||[]).length)render(cached);MS.load().then(render).catch(error=>{if(!(cached.seasons||[]).length)document.getElementById('board').innerHTML=`<div class="card empty">${UI.esc(error.message||error)}</div>`})})();</script></body></html>
