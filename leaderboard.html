<!doctype html><html lang="lv"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#f5f7fb"><title>Kopvērtējums</title><link rel="stylesheet" href="assets/style.css"></head><body><main class="shell"><header class="topbar"><div class="brand">Kopvērtējums</div></header><section class="hero"><div class="eyebrow" id="seasonName">Sērija</div><h1>Leaderboard</h1><p id="subtitle" class="muted"></p></section><div id="board" class="list"></div></main><nav class="bottom-nav"><a href="season.html">Profils</a><a class="active" href="leaderboard.html">Kopvērtējums</a><a href="index.html" onclick="MS.clearSession()">Iziet</a></nav><script src="assets/api.js"></script><script src="assets/app.js"></script><script>(async()=>{const s=MS.session();if(!s?.playerId||!s?.authToken)return location.replace('index.html');const db=await MS.api('bootstrap',{playerId:s.playerId,authToken:s.authToken}),members=UI.membershipsFor(db,s.playerId);let season=db.seasons.find(x=>String(x.id)===String(s.seasonId));if(!season&&members.length){season=db.seasons.find(x=>String(x.id)===String(members[0].seasonId));MS.setSession({...s,seasonId:season?.id||''})}if(!season){board.innerHTML='<div class="card empty">Vispirms pievienojies sērijai profilā.</div>';return}const rows=UI.leaderboard(db,season.id);seasonName.textContent=season.name;subtitle.textContent=`Skaitīti ${season.bestCount||12} labākie rezultāti`;board.innerHTML=rows.length?rows.map(p=>`<div class="row"><div class="rank">${p.rank}</div><img class="avatar sm" src="${p.image||`https://ui-avatars.com/api/?name=${encodeURIComponent(p.name)}&background=e5e7eb&color=111827`}" alt=""><div class="row-main"><div class="row-title">${UI.esc(p.name)}</div><div class="row-sub">${p.events} aktivitātes · skaitīti ${p.countedEvents} · labākais ${p.bestScore}</div></div><div class="points">${p.total}</div></div>`).join(''):'<div class="card empty">Dalībnieku vēl nav.</div>'})().catch(e=>board.innerHTML=`<div class="card empty">${UI.esc(e.message||e)}</div>`)</script></body></html>
