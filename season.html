<!doctype html><html lang="lv"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#f5f7fb"><title>Mans profils</title><link rel="stylesheet" href="assets/style.css"></head><body><main class="shell"><header class="topbar"><div class="brand" id="seasonName">Mans profils</div><div class="nav-actions"><a id="adminLink" class="icon-btn hidden" href="admin.html" aria-label="Admin">⚙</a><button class="icon-btn" id="logoutBtn" aria-label="Iziet">↗</button></div></header><section class="card"><div class="section-head"><div><div class="eyebrow">Aktīvā sērija</div><h2 id="activeSeasonTitle">Nav izvēlēta</h2></div></div><select id="seasonSelect" style="margin-top:12px"></select><form id="joinSeriesForm" class="form-grid two" style="margin-top:12px"><input id="seriesCode" autocapitalize="characters" placeholder="Sērijas kods" required><button class="btn" type="submit">Pievienoties</button></form><div id="seriesState" class="notice hidden" style="margin-top:10px"></div></section><section id="profile" class="card profile-card"><img id="avatar" class="avatar" alt="Profila attēls"><h1 id="playerName">—</h1><div id="playerIdLabel" class="muted"></div><div id="rankPill" class="rank-pill">Izvēlies sēriju</div><div class="stats"><div class="stat"><strong id="total">0</strong><span>BEST PUNKTI</span></div><div class="stat"><strong id="events">0</strong><span>AKTIVITĀTES</span></div><div class="stat"><strong id="avg">0</strong><span>VIDĒJI</span></div></div></section><section class="card next-card"><div class="eyebrow">Nākamā aktivitāte</div><h2 id="nextTitle">Izvēlies sēriju</h2><div id="nextDate" class="next-date"></div><p id="nextDescription" class="muted"></p><button id="registerBtn" class="btn block hidden">Pieteikties</button><div id="registerState" class="notice hidden"></div></section><section class="card"><div class="section-head"><div><div class="eyebrow">Profils</div><h2>Profila attēls</h2></div></div><input id="imageInput" type="file" accept="image/*" hidden><button id="saveImage" class="btn block" style="margin-top:14px">Izvēlēties attēlu</button><div id="imageState" class="notice hidden" style="margin-top:12px"></div></section><section><div class="section-head"><div><div class="eyebrow">Rezultāti</div><h2>Mana vēsture</h2></div></div><div id="history" class="list" style="margin-top:12px"></div></section></main><nav class="bottom-nav"><a class="active" href="season.html">Profils</a><a href="leaderboard.html">Kopvērtējums</a><a href="index.html" id="switchLink">Iziet</a></nav><script src="assets/api.js"></script><script src="assets/app.js"></script><script src="assets/player.js"></script></body></html>
