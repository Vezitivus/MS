<!doctype html><html lang="lv"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#f5f7fb"><title>Mans profils</title><link rel="stylesheet" href="assets/style.css"><style>.simple-profile{text-align:center;padding:28px 18px}.simple-profile .avatar{width:148px;height:148px;margin:0 auto 16px;display:block;cursor:pointer}.simple-profile h1{margin:0;font-size:32px}.series-area{margin-top:14px}.sync-dot{width:9px;height:9px;border-radius:50%;background:#34c759;display:inline-block;margin-right:7px}.series-content.hidden{display:none}</style></head><body><main class="shell"><header class="topbar"><div class="brand">Mans profils</div><div class="nav-actions"><button class="icon-btn" id="logoutBtn" aria-label="Iziet">↗</button></div></header><section class="card simple-profile"><input id="imageInput" type="file" accept="image/*" hidden><img id="avatar" class="avatar" alt="Profila attēls"><h1 id="playerName">—</h1><div id="syncState" class="muted" style="margin-top:10px"><span class="sync-dot"></span>Sinhronizēts</div></section><section class="card series-area"><div class="section-head"><div><div class="eyebrow">Sacensību sērijas</div><h2 id="activeSeasonTitle">Nav izvēlēta</h2></div></div><select id="seasonSelect" style="margin-top:12px"></select><form id="joinSeriesForm" class="form-grid two" style="margin-top:12px"><input id="seriesCode" autocapitalize="characters" placeholder="Privātais sērijas kods" required><button class="btn" type="submit">Pievienoties</button></form><div id="seriesState" class="notice hidden" style="margin-top:10px"></div></section><div id="seriesContent" class="series-content hidden"><section id="profileStats" class="card profile-card"><div id="rankPill" class="rank-pill">#— kopvērtējumā</div><div class="stats"><div class="stat"><strong id="total">0</strong><span>BEST PUNKTI</span></div><div class="stat"><strong id="events">0</strong><span>AKTIVITĀTES</span></div><div class="stat"><strong id="avg">0</strong><span>VIDĒJI</span></div></div></section><section class="card next-card"><div class="eyebrow">Nākamā aktivitāte</div><h2 id="nextTitle">Pašlaik nav ieplānota</h2><div id="nextDate" class="next-date"></div><p id="nextDescription" class="muted"></p><button id="registerBtn" class="btn block hidden">Pieteikties</button><div id="registerState" class="notice hidden"></div></section><section><div class="section-head"><div><div class="eyebrow">Rezultāti</div><h2>Mana vēsture</h2></div></div><div id="history" class="list" style="margin-top:12px"></div></section></div></main><nav class="bottom-nav"><a class="active" href="season.html">Profils</a><a id="leaderboardLink" href="leaderboard.html">Kopvērtējums</a><a href="index.html" id="switchLink">Iziet</a></nav><script src="assets/api.js"></script><script src="assets/app.js"></script><script src="assets/player.js"></script></body></html>
